<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Bell Automation Dashboard</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='icon/favicon.png') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='icon/favicon.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icon/logo.png') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar (minimal, hanya logo) -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">
                    <img src="{{ url_for('static', filename='icon/logo.png') }}" alt="Logo" class="logo-img">
                </div>
                <div class="logo-text">
                    <h2>School Bell</h2>
                    <span>Automation System</span>
                </div>
            </div>
            
            <div class="system-status">
                <div class="status-indicator" id="systemStatus">
                    <span class="status-dot"></span>
                    <span class="status-text">Loading...</span>
                </div>
            </div>
        </aside>

        <!-- Main Content - Split Panel -->
        <main class="main-content">
            <!-- Header -->
            <header class="main-header">
                <div class="header-title">
                    <h1>School Bell Automation</h1>
                    <p>Manage profiles and schedules</p>
                </div>
                <div class="datetime" id="datetime">
                    <span class="time" id="currentTime">--:--:--</span>
                    <span class="date" id="currentDate">-- --- ----</span>
                </div>
            </header>

            <!-- Split Panel: Profiles + Schedules -->
            <div class="split-panel">
                <!-- LEFT PANEL: PROFILES -->
                <div class="profiles-panel">
                    <div class="panel-header">
                        <h3>📁 PROFILES</h3>
                        <button class="btn btn-primary btn-small" onclick="ModalManager.showProfileDialog()">
                            + New
                        </button>
                    </div>
                    
                    <div class="panel-body" id="profilesList">
                        <div class="loading-spinner">Loading profiles...</div>
                    </div>
                </div>

                <!-- RIGHT PANEL: SCHEDULES -->
                <div class="schedules-panel">
                    <div class="panel-header">
                        <div>
                            <h3 id="schedulesPanelTitle">📋 SCHEDULES</h3>
                            <div id="profileStatusWarning" class="profile-status-warning" style="display: none;">
                                ⚠️ Profile INACTIVE - Schedules will NOT run
                            </div>
                        </div>
                        <button class="btn btn-primary" id="addScheduleBtn" onclick="ModalManager.showScheduleDialog()">
                            + Add Schedule
                        </button>
                    </div>

                    <div class="panel-body">
                        <div class="schedules-toolbar">
                            <div class="filter-group">
                                <input type="text" id="scheduleSearch" placeholder="🔍 Search schedule..." class="search-input">
                            </div>
                            <div class="filter-group">
                                <select id="scheduleStatusFilter" class="status-filter">
                                    <option value="all">All Status</option>
                                    <option value="active">Active Only</option>
                                    <option value="inactive">Inactive Only</option>
                                </select>
                            </div>
                        </div>

                        <div class="schedules-table-container" id="schedulesContainer">
                            <div class="empty-state">
                                <div class="empty-icon">📅</div>
                                <h4>No schedules</h4>
                                <p>Select a profile or create a new schedule</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
