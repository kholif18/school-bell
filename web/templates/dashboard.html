<!-- web/templates/dashboard.html -->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Bell Automation System</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .status-bar {
            background: #f0f0f0;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4CAF50;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        .content {
            padding: 30px;
        }
        
        .schedule-form {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .schedule-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .schedule-table th,
        .schedule-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        .schedule-table th {
            background: #667eea;
            color: white;
        }
        
        .schedule-table tr:hover {
            background: #f5f5f5;
        }
        
        .delete-btn {
            background: #f44336;
            padding: 5px 10px;
            font-size: 12px;
        }
        
        .edit-btn {
            background: #ff9800;
            padding: 5px 10px;
            font-size: 12px;
            margin-right: 5px;
        }
        
        .alert {
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏫 School Bell Automation System</h1>
            <p>Automatic Bell Schedule Management</p>
        </div>
        
        <div class="status-bar">
            <div class="status-indicator">
                <div class="status-led" id="statusLed"></div>
                <span id="statusText">Connected</span>
            </div>
            <div>
                Active Schedules: <strong id="activeCount">0</strong>
            </div>
        </div>
        
        <div class="content">
            <div id="alertContainer"></div>
            
            <div class="schedule-form">
                <h2>Add New Schedule</h2>
                <form id="scheduleForm">
                    <div class="form-group">
                        <label>Schedule Name</label>
                        <input type="text" id="scheduleName" required>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Hour</label>
                            <input type="number" id="hour" min="0" max="23" required>
                        </div>
                        <div class="form-group">
                            <label>Minute</label>
                            <input type="number" id="minute" min="0" max="59" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Days (comma separated: 0=Monday, 6=Sunday)</label>
                        <input type="text" id="days" placeholder="0,1,2,3,4">
                    </div>
                    
                    <div class="form-group">
                        <label>Audio File Path (optional)</label>
                        <input type="text" id="audioFile" placeholder="assets/audio/bell.wav">
                    </div>
                    
                    <button type="submit">Add Schedule</button>
                </form>
            </div>
            
            <h2>Schedule List</h2>
            <table class="schedule-table" id="scheduleTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Time</th>
                        <th>Days</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="scheduleList"></tbody>
            </table>
        </div>
    </div>
    
    <script>
        const socket = io();
        
        socket.on('connect', function() {
            updateStatusIndicator(true);
            showAlert('Connected to server', 'success');
            loadSchedules();
        });
        
        socket.on('disconnect', function() {
            updateStatusIndicator(false);
            showAlert('Disconnected from server', 'error');
        });
        
        socket.on('schedule_updated', function(data) {
            loadSchedules();
        });
        
        function updateStatusIndicator(connected) {
            const led = document.getElementById('statusLed');
            const text = document.getElementById('statusText');
            if (connected) {
                led.style.background = '#4CAF50';
                text.textContent = 'Connected';
            } else {
                led.style.background = '#f44336';
                text.textContent = 'Disconnected';
            }
        }
        
        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            container.appendChild(alert);
            setTimeout(() => alert.remove(), 3000);
        }
        
        async function loadSchedules() {
            try {
                const response = await fetch('/api/schedules');
                const schedules = await response.json();
                displaySchedules(schedules);
                
                const statusResponse = await fetch('/api/status');
                const status = await statusResponse.json();
                document.getElementById('activeCount').textContent = status.active_schedules;
            } catch (error) {
                console.error('Error loading schedules:', error);
            }
        }
        
        function displaySchedules(schedules) {
            const tbody = document.getElementById('scheduleList');
            tbody.innerHTML = '';
            
            schedules.forEach(schedule => {
                const row = tbody.insertRow();
                row.insertCell(0).textContent = schedule.name;
                row.insertCell(1).textContent = `${schedule.hour.toString().padStart(2, '0')}:${schedule.minute.toString().padStart(2, '0')}`;
                row.insertCell(2).textContent = schedule.days || 'Mon-Fri';
                row.insertCell(3).innerHTML = schedule.is_active ? '✅ Active' : '❌ Inactive';
                
                const actions = row.insertCell(4);
                const editBtn = document.createElement('button');
                editBtn.textContent = 'Edit';
                editBtn.className = 'edit-btn';
                editBtn.onclick = () => editSchedule(schedule);
                actions.appendChild(editBtn);
                
                const deleteBtn = document.createElement('button');
                deleteBtn.textContent = 'Delete';
                deleteBtn.className = 'delete-btn';
                deleteBtn.onclick = () => deleteSchedule(schedule.id);
                actions.appendChild(deleteBtn);
            });
        }
        
        document.getElementById('scheduleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const schedule = {
                name: document.getElementById('scheduleName').value,
                hour: parseInt(document.getElementById('hour').value),
                minute: parseInt(document.getElementById('minute').value),
                days: document.getElementById('days').value,
                audio_file: document.getElementById('audioFile').value || null
            };
            
            try {
                const response = await fetch('/api/schedules', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(schedule)
                });
                
                if (response.ok) {
                    showAlert('Schedule added successfully', 'success');
                    document.getElementById('scheduleForm').reset();
                    loadSchedules();
                } else {
                    showAlert('Failed to add schedule', 'error');
                }
            } catch (error) {
                showAlert('Error adding schedule', 'error');
            }
        });
        
        async function deleteSchedule(id) {
            if (confirm('Are you sure you want to delete this schedule?')) {
                try {
                    const response = await fetch(`/api/schedules/${id}`, {
                        method: 'DELETE'
                    });
                    
                    if (response.ok) {
                        showAlert('Schedule deleted successfully', 'success');
                        loadSchedules();
                    } else {
                        showAlert('Failed to delete schedule', 'error');
                    }
                } catch (error) {
                    showAlert('Error deleting schedule', 'error');
                }
            }
        }
        
        function editSchedule(schedule) {
            document.getElementById('scheduleName').value = schedule.name;
            document.getElementById('hour').value = schedule.hour;
            document.getElementById('minute').value = schedule.minute;
            document.getElementById('days').value = schedule.days || '';
            document.getElementById('audioFile').value = schedule.audio_file || '';
            
            showAlert('Edit the schedule and click Add to update', 'success');
        }
        
        setInterval(loadSchedules, 5000);
    </script>
</body>
</html>
